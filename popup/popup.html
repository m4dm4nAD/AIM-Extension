<!DOCTYPE html>
<html>
<head>
  <title>AIM Detection</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .status {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .safe {
      background-color: #e7f5e7;
      color: #0f5f0f;
    }
    .warning {
      background-color: #fff3cd;
      color: #856404;
    }
    .danger {
      background-color: #f8d7da;
      color: #721c24;
    }
    .history {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
    }
    .history-item {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div id="currentStatus" class="status safe">
    <h3>Current Site Status</h3>
    <p id="statusMessage">Checking site security...</p>
  </div>

  <div class="history">
    <h3>Recent Alerts</h3>
    <div id="alertHistory"></div>
  </div>

  <button id="clearHistory">Clear History</button>
  <script src="./popup.js"></script>
</body>
</html>
